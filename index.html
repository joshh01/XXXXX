<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>5X</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0e0e0e;
    --bg2: #141414;
    --bg3: #1a1a1a;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #e8e8e8;
    --text2: rgba(255,255,255,0.45);
    --text3: rgba(255,255,255,0.25);
    --accent: #c8f135;
    --amber: rgba(255,175,50,0.45);
    --amber-bg: rgba(255,155,30,0.06);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }



  /* TABS */
  .tab-bar {
    display: flex;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    flex-shrink: 0;
    padding: 0 20px;
  }

  .tab {
    padding: 14px 20px 13px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text2);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s;
    letter-spacing: 0.02em;
    user-select: none;
  }

  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab.ready { color: rgba(200,241,53,0.6); }

  .tab-panel { display: none; flex: 1; flex-direction: column; overflow: hidden; }
  .tab-panel.active { display: flex; }

  /* CHAT */
  .chat-wrap {
    flex: 1;
    overflow-y: auto;
    padding: 24px 0 8px;
    scroll-behavior: smooth;
  }

  .chat-wrap::-webkit-scrollbar { width: 4px; }
  .chat-wrap::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

  .msg-row { padding: 2px 24px; display: flex; align-items: flex-start; }
  .msg-row.user { justify-content: flex-end; }

  .bubble {
    max-width: 78%;
    padding: 11px 15px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.65;
    border: 1px solid transparent;
    white-space: pre-wrap;
  }

  .bubble.coach {
    background: var(--bg2);
    border-color: var(--border);
    border-radius: 4px 16px 16px 16px;
    color: var(--text);
  }

  .bubble.user {
    background: rgba(200,241,53,0.08);
    border-color: rgba(200,241,53,0.15);
    border-radius: 16px 4px 16px 16px;
    color: var(--text);
  }

  .bubble.deep-bubble {
    border-color: var(--amber) !important;
    background: linear-gradient(160deg, var(--bg2) 50%, var(--amber-bg) 100%);
    box-shadow: 0 0 0 1px rgba(255,155,30,0.1);
  }

  .bubble.system-msg {
    background: transparent;
    border-color: transparent;
    color: var(--text3);
    font-size: 12px;
    font-style: italic;
    padding: 4px 0;
    max-width: 100%;
  }

  .msg-time {
    font-size: 10px;
    color: var(--text3);
    margin-top: 2px;
    padding: 0 24px;
  }

  .msg-time.right { text-align: right; }

  /* CARDS */
  .profile-card {
    margin: 10px 24px;
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 12px;
    padding: 18px 20px;
  }

  .card-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .profile-row {
    display: flex;
    gap: 10px;
    margin-bottom: 8px;
    align-items: flex-start;
  }

  .pkey {
    color: var(--text3);
    font-size: 12px;
    min-width: 118px;
    flex-shrink: 0;
    padding-top: 1px;
  }

  .pval { color: var(--text); font-size: 13px; line-height: 1.5; }
  .pval.accent { color: var(--accent); }

  .ladder-card {
    margin: 10px 24px;
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 12px;
    overflow: hidden;
  }

  .ladder-head {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
  }

  .ladder-step {
    padding: 11px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }

  .ladder-step:last-child { border-bottom: none; }

  .step-num {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--bg3);
    border: 1px solid var(--border2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 600;
    color: var(--text2);
    flex-shrink: 0;
    margin-top: 1px;
  }

  .step-num.active {
    background: rgba(200,241,53,0.1);
    border-color: rgba(200,241,53,0.3);
    color: var(--accent);
  }

  .step-time { font-size: 11px; color: var(--text3); margin-bottom: 2px; }
  .step-text { font-size: 13px; color: var(--text); line-height: 1.5; }
  .step-why { font-size: 12px; color: var(--text2); margin-top: 3px; font-style: italic; }

  .action-btn {
    margin: 4px 24px 12px;
    background: rgba(200,241,53,0.07);
    border: 1px solid rgba(200,241,53,0.2);
    color: var(--accent);
    padding: 10px 16px;
    border-radius: 10px;
    font-size: 13px;
    cursor: pointer;
    width: calc(100% - 48px);
    text-align: left;
    font-family: inherit;
    transition: background 0.15s;
  }

  .action-btn:hover { background: rgba(200,241,53,0.12); }

  /* TYPING */
  .typing-wrap { display: none; padding: 4px 24px 6px; }
  .typing-wrap.visible { display: flex; }

  .typing-dots {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 4px 14px 14px 14px;
    padding: 10px 14px;
    display: flex;
    gap: 4px;
    align-items: center;
  }

  .dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--text3);
    animation: blink 1.2s ease-in-out infinite;
  }

  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink {
    0%, 60%, 100% { opacity: 0.3; transform: scale(0.85); }
    30% { opacity: 1; transform: scale(1); }
  }

  /* INPUT */
  .input-area {
    padding: 10px 20px 16px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .input-row { display: flex; gap: 8px; align-items: flex-end; }

  textarea {
    flex: 1;
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 12px;
    padding: 10px 14px;
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    resize: none;
    outline: none;
    line-height: 1.5;
    min-height: 42px;
    max-height: 120px;
    transition: border-color 0.15s;
  }

  textarea:focus { border-color: rgba(255,255,255,0.2); }
  textarea::placeholder { color: var(--text3); }
  textarea:disabled { opacity: 0.4; }

  .send-btn {
    width: 36px; height: 36px;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.15s;
    margin-bottom: 3px;
  }

  .send-btn:hover { opacity: 0.85; }
  .send-btn:disabled { opacity: 0.3; cursor: default; }

  /* CHECK-IN STATUS */
  .checkin-bar {
    display: none;
    padding: 9px 24px;
    font-size: 12px;
    color: var(--text2);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    align-items: center;
    gap: 8px;
  }

  .checkin-bar.visible { display: flex; }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: glow 2s ease-in-out infinite;
  }

  @keyframes glow {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }

  /* NO PROFILE */
  .no-profile {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    color: var(--text3);
    font-size: 13px;
    text-align: center;
    padding: 40px;
  }

  .version { position: fixed; bottom: 76px; right: 16px; font-size: 9px; color: var(--text3); pointer-events: none; }
</style>
</head>
<body>

<!-- TABS -->
<div class="tab-bar">
  <div class="tab active" data-tab="onboarding">Onboarding</div>
  <div class="tab" data-tab="checkin" id="checkin-tab">Daily Check-in</div>
</div>

<!-- ONBOARDING TAB -->
<div class="tab-panel active" id="tab-onboarding">
  <div class="chat-wrap" id="ob-chat"></div>
  <div class="typing-wrap" id="ob-typing">
    <div class="typing-dots">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
  </div>
  <div class="input-area">
    <div class="input-row">
      <textarea id="ob-input" placeholder="Type here..." rows="1"></textarea>
      <button class="send-btn" id="ob-send">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M2 8h12M10 4l4 4-4 4" stroke="#0e0e0e" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<!-- CHECK-IN TAB -->
<div class="tab-panel" id="tab-checkin">
  <div class="checkin-bar" id="ci-bar">
    <div class="status-dot"></div>
    <span id="ci-bar-text">Check-in active</span>
  </div>
  <div class="chat-wrap" id="ci-chat"></div>
  <div class="typing-wrap" id="ci-typing">
    <div class="typing-dots">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
  </div>
  <div class="input-area">
    <div class="input-row">
      <textarea id="ci-input" placeholder="Type here..." rows="1"></textarea>
      <button class="send-btn" id="ci-send">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M2 8h12M10 4l4 4-4 4" stroke="#0e0e0e" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<div class="version">v17</div>

<script>
// ── STATE ──
const PROXY = 'https://5-x.vercel.app/api/proxy';

let obHistory = [];
let ciHistory = [];
let profile = null;
let ladder = null;
let obPhase = 'chat'; // chat | await_ladder | done
let ciStarted = false;
let obDeepCount = 0, obLastDeep = -99, obExchanges = 0;
let ciDeepCount = 0, ciLastDeep = -99, ciExchanges = 0;

// ── SYSTEM PROMPTS ──

const OB_SYSTEM = `You are the 5X coach. Your job is to run a diagnostic conversation that uncovers the real blocker — not the stated goal. You are direct, perceptive, and human. You do not flatter. You do not use coaching clichés. You write in short paragraphs, not lists.

THE THREE PHASES: Diagnosis → Mirror → Ladder

FIVE SIGNALS TO UNCOVER (in order):
1. Real goal underneath the stated goal
2. Root environmental blocker
3. Historical failure pattern
4. Identity gap — who they are vs who they want to be
5. Keystone area — the one change that unlocks everything else

CONVERSATION RULES:
- Open with a single direct question: what they want to change and why now.
- Never ask two questions in one message. One question, full stop.
- Never use: accountable, journey, mindset, authentic, potential, actionable.
- Keep responses short. 2–4 sentences max during diagnosis. Never lecture.
- Mirror their exact language back. If they say "drained" — use that word.
- The presenting problem is never the real problem. Keep digging until you find the environmental or identity root.
- When you have enough on all five signals, surface the mirror.

DEEP QUESTIONS:
- Signal with [DEEP] at the very start of your message (stripped by frontend — user never sees it).
- Maximum 3 times per entire conversation. Reserve for: peak moment, identity gap, root fear.
- Never use [DEEP] within 4 exchanges of the previous one.
- No prefix text before the question. The question carries its own weight.

MIRROR FORMAT — output when diagnosis is complete:
---MIRROR---
Segment A (4–6 sentences in their exact language — reflect the real goal, the blocker, the failure pattern. No advice. Make them feel seen.)

Segment B (identity reframe and path forward — personalised to what they shared. End with a bridge question: e.g. "Ready to build the structure that makes every week feel like China?")
---MIRROR_END---

After mirror output, pause. Wait for confirmation. Then ask the commit question: what is the one specific action they will do today — not tomorrow — with a time attached.

Commit quality rules:
- Must be an action, not setup or consumption
- Must have a specific time attached
- Push back if vague: "What time exactly?" or "What's the first action, not the plan?"

After commit is confirmed, output ONLY the profile block:

---PROFILE---
NAME: [first name]
STATED_GOAL: [one sentence]
REAL_GOAL: [the deeper goal underneath]
ROOT_BLOCKER: [environmental or structural root cause]
FAILURE_PATTERN: [how they historically fall off]
IDENTITY_GAP: [who they are vs who they want to be, specific]
PEAK_MOMENT: [a specific time they were the person they want to be]
KEYSTONE: [the one area that unlocks the rest]
COACHING_TONE: [direct | firm | gentle | analytical]
ACTIVE_STEP: [their commit from this conversation]
---PROFILE_END---

The ladder block is output SEPARATELY — only when the frontend sends "Generate my action plan." Output ONLY:

---LADDER---
STEP_1 | Day 1 | [specific action] | WHY: [reason tied to their root blocker]
STEP_2 | Days 2–3 | [action] | WHY: [reason]
STEP_3 | Days 4–7 | [action] | WHY: [reason]
STEP_4 | Week 2 | [action] | WHY: [reason]
STEP_5 | Week 3 | [action] | WHY: [reason]
STEP_6 | Week 4 | [action] | WHY: [reason]
STEP_7 | Weeks 5–6 | [action] | WHY: [reason]
---LADDER_END---

Each step must address their specific failure pattern and root blocker. Each must be concrete enough to do or fail clearly. No motivational filler.

SENSITIVE SITUATIONS:
- Relationships: reflect, never prescribe.
- Abuse or danger: stop everything, provide one resource, ask if they want to continue.
- Mental health crisis: acknowledge, one resource, be human first, do not coach.`;

function buildCISystem(p, l) {
  const today = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
  let ladderText = '';
  if (l && l.length) {
    ladderText = '\n\nTHEIR LADDER:\n' + l.map((s, i) => `Step ${i+1} (${s.time}): ${s.text}`).join('\n');
  }
  return `You are the 5X coach running a daily check-in. Today is ${today}.

THEIR PROFILE:
- Name: ${p.NAME || 'them'}
- Real goal: ${p.REAL_GOAL || p.STATED_GOAL || ''}
- Root blocker: ${p.ROOT_BLOCKER || ''}
- Failure pattern: ${p.FAILURE_PATTERN || ''}
- Identity gap: ${p.IDENTITY_GAP || ''}
- Peak moment: ${p.PEAK_MOMENT || ''}
- Keystone area: ${p.KEYSTONE || ''}
- Active commitment: ${p.ACTIVE_STEP || ''}
- Coaching tone: ${p.COACHING_TONE || 'direct'}${ladderText}

CHECK-IN RULES:
- You already know who they are. Do not introduce yourself or re-explain 5X.
- Open with ONE direct question referencing their specific commitment (${p.ACTIVE_STEP || 'their last commitment'}). Not "how are you doing?"
- Keep the entire check-in to 5–8 exchanges. This is a check-in, not a new onboarding.
- Affirm wins directly and briefly. One sentence.
- When they report a failure: do not shame. Probe once for the environmental cause, then move forward.
- Reference their failure pattern when relevant — this shows you remember them.
- Reference their peak moment when they need a reference point for who they can be.
- End with one specific forward commitment for today or tomorrow: action, not consumption, specific time attached.
- After the forward commit is confirmed, output:

---CHECKIN_CLOSE---
WIN: [one-line summary of what they acknowledged or did well]
CHALLENGE: [honest one-line on what they're working through]
NEXT: [the specific commit they just made with time]
---CHECKIN_CLOSE_END---

DEEP QUESTIONS:
- [DEEP] tag available — same rules. Max 3 per session. Only for moments that matter.

SENSITIVE SITUATIONS: same rules as onboarding apply.`;
}

// ── API CALL ──
async function callAPI(system, history, maxTokens) {
  const res = await fetch(PROXY, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: maxTokens,
      system: system,
      messages: history
    })
  });
  const data = await res.json();
  if (!res.ok || data.error) {
    const msg = data.error?.message || `HTTP ${res.status}`;
    console.error('API error:', msg, data);
    throw new Error(msg);
  }
  return data.content?.[0]?.text || '';
}

// ── DOM HELPERS ──
function ts() {
  return new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
}

function scrollDown(id) {
  const el = document.getElementById(id);
  if (el) el.scrollTop = el.scrollHeight;
}

function addBubble(chatId, role, text, deep = false) {
  const chat = document.getElementById(chatId);
  const row = document.createElement('div');
  row.className = 'msg-row' + (role === 'user' ? ' user' : '');
  const bub = document.createElement('div');
  bub.className = 'bubble ' + (role === 'user' ? 'user' : 'coach');
  if (deep) bub.classList.add('deep-bubble');
  bub.textContent = text;
  row.appendChild(bub);
  chat.appendChild(row);
  const t = document.createElement('div');
  t.className = 'msg-time' + (role === 'user' ? ' right' : '');
  t.textContent = ts();
  chat.appendChild(t);
  scrollDown(chatId);
}

function addSystem(chatId, text) {
  const chat = document.getElementById(chatId);
  const row = document.createElement('div');
  row.className = 'msg-row';
  const bub = document.createElement('div');
  bub.className = 'bubble system-msg';
  bub.textContent = text;
  row.appendChild(bub);
  chat.appendChild(row);
  scrollDown(chatId);
}

function addHTML(chatId, html) {
  const chat = document.getElementById(chatId);
  const wrap = document.createElement('div');
  wrap.innerHTML = html;
  chat.appendChild(wrap);
  scrollDown(chatId);
}

function setTyping(id, on) {
  document.getElementById(id).classList.toggle('visible', on);
}

function lockInput(inputId, btnId, lock) {
  document.getElementById(inputId).disabled = lock;
  document.getElementById(btnId).disabled = lock;
}

// ── PARSE HELPERS ──
function parseProfile(text) {
  const p = {};
  for (const line of text.split('\n')) {
    const i = line.indexOf(':');
    if (i === -1) continue;
    const k = line.slice(0, i).trim();
    const v = line.slice(i + 1).trim();
    if (k && v) p[k] = v;
  }
  return p;
}

function parseLadder(text) {
  return text.split('\n').filter(l => l.trim()).map(line => {
    const parts = line.split('|');
    if (parts.length < 3) return null;
    const why = (parts[3] || '').replace(/^WHY:\s*/i, '').trim();
    return { time: parts[1].trim(), text: parts[2].trim(), why };
  }).filter(Boolean);
}

// ── RENDER CARDS ──
function renderProfile(p) {
  const row = (label, val, accent) =>
    val ? `<div class="profile-row"><span class="pkey">${label}</span><span class="pval${accent?' accent':''}">${val}</span></div>` : '';
  return `<div class="profile-card">
    <div class="card-label">Your Profile</div>
    ${row('Name', p.NAME)}
    ${row('Real goal', p.REAL_GOAL || p.STATED_GOAL)}
    ${row('Root blocker', p.ROOT_BLOCKER)}
    ${row('Failure pattern', p.FAILURE_PATTERN)}
    ${row('Identity gap', p.IDENTITY_GAP)}
    ${row('Peak moment', p.PEAK_MOMENT)}
    ${row("Today's commit", p.ACTIVE_STEP, true)}
  </div>`;
}

function renderLadder(steps) {
  const stepsHtml = steps.map((s, i) => `
    <div class="ladder-step">
      <div class="step-num ${i===0?'active':''}">${i+1}</div>
      <div>
        <div class="step-time">${s.time}</div>
        <div class="step-text">${s.text}</div>
        ${s.why ? `<div class="step-why">${s.why}</div>` : ''}
      </div>
    </div>`).join('');
  return `<div class="ladder-card">
    <div class="ladder-head"><div class="card-label" style="margin:0;">Action Plan</div></div>
    ${stepsHtml}
  </div>`;
}

function renderClose(text) {
  const get = (key) => text.match(new RegExp(key + ':\\s*(.+)', 'i'))?.[1]?.trim() || '';
  const win = get('WIN'), challenge = get('CHALLENGE'), next = get('NEXT');
  const row = (label, val, accent) =>
    val ? `<div class="profile-row"><span class="pkey">${label}</span><span class="pval${accent?' accent':''}">${val}</span></div>` : '';
  return `<div class="profile-card">
    <div class="card-label">Session Summary</div>
    ${row('Win', win, true)}
    ${row('Working through', challenge)}
    ${row('Next commit', next)}
  </div>`;
}

// ── ONBOARDING ──
async function obSend(userMsg) {
  obHistory.push({ role: 'user', content: userMsg });
  lockInput('ob-input', 'ob-send', true);
  setTyping('ob-typing', true);

  let raw = '';
  try {
    raw = await callAPI(OB_SYSTEM, obHistory, 1000);
  } catch(e) {
    setTyping('ob-typing', false);
    const msg = 'Error: ' + (e.message || 'Connection failed — check console for details.');
    addBubble('ob-chat', 'coach', msg);
    obHistory.push({ role: 'assistant', content: msg });
    lockInput('ob-input', 'ob-send', false);
    return;
  }

  setTyping('ob-typing', false);
  obHistory.push({ role: 'assistant', content: raw });

  if (raw.includes('---PROFILE---')) {
    const before = raw.split('---PROFILE---')[0].trim();
    const block = raw.split('---PROFILE---')[1].split('---PROFILE_END---')[0].trim();
    profile = parseProfile(block);
    if (before) addBubble('ob-chat', 'coach', before);
    addHTML('ob-chat', renderProfile(profile));

    const btn = document.createElement('button');
    btn.className = 'action-btn';
    btn.textContent = 'See my full action plan →';
    btn.onclick = () => {
      btn.remove();
      addBubble('ob-chat', 'user', 'Generate my action plan.');
      obPhase = 'await_ladder';
      obHistory.push({ role: 'user', content: 'Generate my action plan.' });
      obSendLadder();
    };
    document.getElementById('ob-chat').appendChild(btn);
    obPhase = 'await_ladder';
    lockInput('ob-input', 'ob-send', true);

  } else if (raw.includes('---LADDER---')) {
    const block = raw.split('---LADDER---')[1].split('---LADDER_END---')[0].trim();
    ladder = parseLadder(block);
    addHTML('ob-chat', renderLadder(ladder));
    document.getElementById('checkin-tab').classList.add('ready');
    addSystem('ob-chat', 'Onboarding complete — head to Daily Check-in to start your first session.');
    obPhase = 'done';
    lockInput('ob-input', 'ob-send', true);

  } else {
    const isDeep = raw.startsWith('[DEEP]');
    const clean = raw.replace(/^\[DEEP\]\s*/, '').trim();
    const showDeep = isDeep && obDeepCount < 3 && (obExchanges - obLastDeep) >= 4;
    addBubble('ob-chat', 'coach', clean, showDeep);
    if (showDeep) { obDeepCount++; obLastDeep = obExchanges; }
    obExchanges++;
    lockInput('ob-input', 'ob-send', false);
  }

  scrollDown('ob-chat');
}

async function obSendLadder() {
  setTyping('ob-typing', true);
  let raw = '';
  try {
    raw = await callAPI(OB_SYSTEM, obHistory, 800);
  } catch(e) {
    setTyping('ob-typing', false);
    addBubble('ob-chat', 'coach', 'Connection issue — try again.');
    return;
  }
  setTyping('ob-typing', false);
  obHistory.push({ role: 'assistant', content: raw });

  if (raw.includes('---LADDER---')) {
    const block = raw.split('---LADDER---')[1].split('---LADDER_END---')[0].trim();
    ladder = parseLadder(block);
    addHTML('ob-chat', renderLadder(ladder));
    document.getElementById('checkin-tab').classList.add('ready');
    addSystem('ob-chat', 'Onboarding complete — head to Daily Check-in to start your first session.');
    obPhase = 'done';
  } else {
    addBubble('ob-chat', 'coach', raw.replace(/^\[DEEP\]\s*/, '').trim());
  }
  scrollDown('ob-chat');
}

// ── CHECK-IN ──
async function ciSend(userMsg) {
  ciHistory.push({ role: 'user', content: userMsg });
  lockInput('ci-input', 'ci-send', true);
  setTyping('ci-typing', true);

  let raw = '';
  try {
    raw = await callAPI(buildCISystem(profile, ladder), ciHistory, 600);
  } catch(e) {
    setTyping('ci-typing', false);
    addBubble('ci-chat', 'coach', 'Connection issue — try again.');
    ciHistory.push({ role: 'assistant', content: 'Connection issue — try again.' });
    lockInput('ci-input', 'ci-send', false);
    return;
  }

  setTyping('ci-typing', false);
  ciHistory.push({ role: 'assistant', content: raw });

  if (raw.includes('---CHECKIN_CLOSE---')) {
    const before = raw.split('---CHECKIN_CLOSE---')[0].trim();
    const block = raw.split('---CHECKIN_CLOSE---')[1].split('---CHECKIN_CLOSE_END---')[0].trim();
    if (before) addBubble('ci-chat', 'coach', before);
    addHTML('ci-chat', renderClose(block));
    const next = block.match(/NEXT:\s*(.+)/i)?.[1]?.trim();
    if (next && profile) profile.ACTIVE_STEP = next;
    addSystem('ci-chat', 'Check-in complete. See you tomorrow.');
    document.getElementById('ci-bar').classList.remove('visible');
    lockInput('ci-input', 'ci-send', true);
  } else {
    const isDeep = raw.startsWith('[DEEP]');
    const clean = raw.replace(/^\[DEEP\]\s*/, '').trim();
    const showDeep = isDeep && ciDeepCount < 3 && (ciExchanges - ciLastDeep) >= 4;
    addBubble('ci-chat', 'coach', clean, showDeep);
    if (showDeep) { ciDeepCount++; ciLastDeep = ciExchanges; }
    ciExchanges++;
    lockInput('ci-input', 'ci-send', false);
  }

  scrollDown('ci-chat');
}

function initCheckin() {
  if (ciStarted) return;

  if (!profile) {
    document.getElementById('ci-chat').innerHTML = `
      <div class="no-profile">
        <div style="color:var(--text3);font-size:32px;margin-bottom:4px;">○</div>
        <div>Complete onboarding first</div>
        <div style="font-size:12px;margin-top:4px;">Your coach needs your profile before check-ins can start.</div>
      </div>`;
    lockInput('ci-input', 'ci-send', true);
    return;
  }

  ciStarted = true;
  ciHistory = [];
  ciDeepCount = 0; ciLastDeep = -99; ciExchanges = 0;

  const dateStr = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
  document.getElementById('ci-bar').classList.add('visible');
  document.getElementById('ci-bar-text').textContent = 'Check-in · ' + dateStr;

  ciHistory.push({ role: 'user', content: 'Starting my check-in.' });
  lockInput('ci-input', 'ci-send', true);
  setTyping('ci-typing', true);

  callAPI(buildCISystem(profile, ladder), ciHistory, 600).then(raw => {
    setTyping('ci-typing', false);
    ciHistory.push({ role: 'assistant', content: raw });
    const isDeep = raw.startsWith('[DEEP]');
    const clean = raw.replace(/^\[DEEP\]\s*/, '').trim();
    addBubble('ci-chat', 'coach', clean, isDeep && ciDeepCount < 3);
    if (isDeep) { ciDeepCount++; ciLastDeep = 0; }
    ciExchanges++;
    lockInput('ci-input', 'ci-send', false);
    scrollDown('ci-chat');
  }).catch(() => {
    setTyping('ci-typing', false);
    addBubble('ci-chat', 'coach', 'Connection issue — try again.');
    lockInput('ci-input', 'ci-send', false);
  });
}

// ── TAB SWITCHING ──
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    const t = tab.dataset.tab;
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(x => x.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-' + t).classList.add('active');
    if (t === 'checkin') initCheckin();
  });
});

// ── INPUT SETUP ──
function wireInput(inputId, btnId, sendFn) {
  const input = document.getElementById(inputId);
  const btn = document.getElementById(btnId);
  btn.addEventListener('click', sendFn);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendFn(); }
  });
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  });
}

wireInput('ob-input', 'ob-send', () => {
  const v = document.getElementById('ob-input').value.trim();
  if (!v || obPhase === 'done' || obPhase === 'await_ladder') return;
  document.getElementById('ob-input').value = '';
  document.getElementById('ob-input').style.height = 'auto';
  addBubble('ob-chat', 'user', v);
  obSend(v);
});

wireInput('ci-input', 'ci-send', () => {
  const v = document.getElementById('ci-input').value.trim();
  if (!v) return;
  document.getElementById('ci-input').value = '';
  document.getElementById('ci-input').style.height = 'auto';
  addBubble('ci-chat', 'user', v);
  ciSend(v);
});

// ── BOOT ──
function bootOnboarding() {
  lockInput('ob-input', 'ob-send', true);
  setTyping('ob-typing', true);
  const opening = [{ role: 'user', content: 'Hello.' }];
  callAPI(OB_SYSTEM, opening, 300).then(raw => {
    setTyping('ob-typing', false);
    obHistory = opening;
    obHistory.push({ role: 'assistant', content: raw });
    const clean = raw.replace(/^\[DEEP\]\s*/, '').trim();
    addBubble('ob-chat', 'coach', clean);
    lockInput('ob-input', 'ob-send', false);
  }).catch((e) => {
    setTyping('ob-typing', false);
    addBubble('ob-chat', 'coach', 'Error: ' + (e.message || 'Could not connect — check console (F12) for details.'));
  });
}

window.addEventListener('load', bootOnboarding);


</script>
